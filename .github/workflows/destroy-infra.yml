name: Destroy Infrastructure (GCP / GKE)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to destroy: staging | prod"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      confirm:
        description: 'Type "destroy" to confirm'
        required: true

jobs:
  destroy:
    name: Destroy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    environment:
      name: ${{ github.event.inputs.environment }}

    env:
      ENV: ${{ github.event.inputs.environment }}

    steps:
      - name: Confirm destroy
        if: github.event.inputs.confirm != 'destroy'
        run: |
          echo "Destruction not confirmed. Cancelling."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        working-directory: infra/envs/${{ env.ENV }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: infra/envs/${{ env.ENV }}
        run: terraform destroy -auto-approve
        env:
          TF_VAR_project_id:      ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_docker_username: ${{ secrets.DOCKER_USERNAME }}
          TF_VAR_db_password:     ${{ secrets.DB_PASSWORD }}
