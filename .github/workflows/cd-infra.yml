name: CD - Infrastructure (GCP / GKE)

# ─────────────────────────────────────────────────────────────────────────────
# Triggered by the dev repo (ci-main.yml / ci-release.yml) via workflow_dispatch
# after Docker images are pushed to Docker Hub.
#
# Authentication: Workload Identity Federation (no long-lived JSON keys).
#
# Secrets required (Settings → Secrets → Actions):
#   WIF_PROVIDER    — Workload Identity Provider resource name
#                     projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider
#   WIF_SA          — Service account email
#                     tf-deployer@ingesoft-v.iam.gserviceaccount.com
#   GCP_PROJECT_ID  — GCP project ID (e.g. ingesoft-v)
#   DOCKER_USERNAME — Docker Hub username
#   DB_PASSWORD     — PostgreSQL password
#
# Required service account roles:
#   - roles/container.admin
#   - roles/iam.serviceAccountUser
#   - roles/compute.viewer
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (git SHA or named tag)"
        required: true
        default: "prod"
      environment:
        description: "Target environment: staging | prod"
        required: true
        default: "prod"
        type: choice
        options:
          - staging
          - prod

jobs:
  deploy:
    name: Terraform Deploy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest

    # Required for Workload Identity Federation OIDC token request
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: infra/envs/${{ github.event.inputs.environment }}

    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="image_tag=${{ github.event.inputs.image_tag }}"
        env:
          TF_VAR_project_id:      ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_docker_username: ${{ secrets.DOCKER_USERNAME }}
          TF_VAR_db_password:     ${{ secrets.DB_PASSWORD }}

      # ── Manual approval gate for prod ──────────────────────────────────────
      # Enforced by GitHub Environments with required reviewers.
      # Configure: Settings → Environments → prod → Required reviewers.
      # ───────────────────────────────────────────────────────────────────────

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="image_tag=${{ github.event.inputs.image_tag }}"
        env:
          TF_VAR_project_id:      ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_docker_username: ${{ secrets.DOCKER_USERNAME }}
          TF_VAR_db_password:     ${{ secrets.DB_PASSWORD }}

      - name: Show deployment outputs
        run: terraform output
        env:
          TF_VAR_project_id:      ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_docker_username: ${{ secrets.DOCKER_USERNAME }}
          TF_VAR_db_password:     ${{ secrets.DB_PASSWORD }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Rollback: trigger this workflow manually via workflow_dispatch with:
  #   image_tag: <previous-git-sha>
  #   environment: prod
  # Terraform will update the Kubernetes Deployments to pull the previous image.
  # ─────────────────────────────────────────────────────────────────────────────
