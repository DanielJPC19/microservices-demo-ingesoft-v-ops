name: CD - Infrastructure (GCP / GKE)

# ─────────────────────────────────────────────────────────────────────────────
# Triggered by the dev repo (ci-main.yml) via workflow_dispatch after all
# Docker images are pushed to Docker Hub.
#
# This workflow provisions GKE clusters and deploys all services via Terraform.
#
# Secrets required (Settings → Secrets → Actions):
#   GOOGLE_CREDENTIALS  — GCP service account key JSON (with roles below)
#   GCP_PROJECT_ID      — GCP project ID (e.g. my-project-123456)
#   DOCKER_USERNAME     — Docker Hub username
#   DB_PASSWORD         — PostgreSQL password
#
# Required GCP service account roles:
#   - roles/container.admin       (create/manage GKE clusters)
#   - roles/iam.serviceAccountUser (use service accounts for node pools)
#   - roles/compute.viewer         (read network/compute resources)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (git SHA or named tag)"
        required: true
        default: "prod"
      environment:
        description: "Target environment: dev | staging | prod"
        required: true
        default: "prod"
        type: choice
        options:
          - staging
          - prod

jobs:
  deploy:
    name: Terraform Deploy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/envs/${{ github.event.inputs.environment }}

    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="image_tag=${{ github.event.inputs.image_tag }}"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TF_VAR_project_id:      ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_docker_username: ${{ secrets.DOCKER_USERNAME }}
          TF_VAR_db_password:     ${{ secrets.DB_PASSWORD }}

      # ── Manual approval gate for prod ──────────────────────────────────────
      # Enforced by GitHub Environments with required reviewers.
      # Configure: Settings → Environments → prod → Required reviewers.
      # ───────────────────────────────────────────────────────────────────────

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="image_tag=${{ github.event.inputs.image_tag }}"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TF_VAR_project_id:      ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_docker_username: ${{ secrets.DOCKER_USERNAME }}
          TF_VAR_db_password:     ${{ secrets.DB_PASSWORD }}

      - name: Show deployment outputs
        run: terraform output
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TF_VAR_project_id:      ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_docker_username: ${{ secrets.DOCKER_USERNAME }}
          TF_VAR_db_password:     ${{ secrets.DB_PASSWORD }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Rollback: trigger this workflow manually via workflow_dispatch with:
  #   image_tag: <previous-git-sha>
  #   environment: prod
  # Terraform will update the Kubernetes Deployments to pull the previous image.
  # ─────────────────────────────────────────────────────────────────────────────
