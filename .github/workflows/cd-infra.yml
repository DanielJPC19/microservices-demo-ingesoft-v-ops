name: CD - Infrastructure (Simulated Infra Repo)

# ─────────────────────────────────────────────────────────────────────────────
# In a real two-repo setup this workflow would live in the infrastructure
# repository and be triggered via repository_dispatch from the dev repo.
#
# Here it is simulated within the same repo:
#   - ci-main.yml calls workflow_dispatch on this file after all images are pushed.
#   - This workflow runs Terraform from infra/envs/<environment>/.
#
# Secrets required (set in GitHub → Settings → Secrets):
#   DOCKER_USERNAME   — Docker Hub user (used as TF_VAR_docker_username)
#   DB_PASSWORD       — PostgreSQL password (used as TF_VAR_db_password)
#   TF_API_TOKEN      — Terraform Cloud token (optional, for remote state)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (git SHA or named tag)"
        required: true
        default: "prod"
      environment:
        description: "Target environment: dev | staging | prod"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  deploy:
    name: Terraform Deploy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/envs/${{ github.event.inputs.environment }}

    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          # Uncomment to use Terraform Cloud for remote state:
          # cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="image_tag=${{ github.event.inputs.image_tag }}"
        env:
          TF_VAR_docker_username: ${{ secrets.DOCKER_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      # ── Manual approval gate for prod ──────────────────────────────────────
      # GitHub Environments with "required reviewers" enforces this.
      # Configure in: Settings → Environments → prod → Required reviewers.
      # ───────────────────────────────────────────────────────────────────────

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="image_tag=${{ github.event.inputs.image_tag }}"
        env:
          TF_VAR_docker_username: ${{ secrets.DOCKER_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Show deployment outputs
        run: terraform output
        env:
          TF_VAR_docker_username: ${{ secrets.DOCKER_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Rollback instructions (not automated — operator action):
  #
  # 1. Find the last stable git SHA from Docker Hub or from a previous
  #    successful run of ci-main.yml.
  # 2. Manually trigger this workflow (workflow_dispatch) with:
  #      image_tag: <previous-git-sha>
  #      environment: prod
  # 3. Terraform will replace running containers with the previous image version.
  #    No code changes are needed in the dev repo.
  # ─────────────────────────────────────────────────────────────────────────────
